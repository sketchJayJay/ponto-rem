{% extends "admin/admin_base.html" %}
{% block admin_content %}
<header class="page-head"><div><p class="eyebrow">Configurações</p><h1>Catálogo público</h1></div></header>
<form method="post" class="panel form-grid">
  <label>Nome da loja<input name="store_name" value="{{ settings.store_name }}"></label>
  <label>Subtítulo<input name="store_subtitle" value="{{ settings.store_subtitle }}"></label>
  <label>Texto do catálogo<textarea name="catalog_intro" rows="3">{{ settings.catalog_intro }}</textarea></label>
  <div class="split">
    <label>WhatsApp da loja<input name="whatsapp" value="{{ settings.whatsapp }}" placeholder="Ex.: 32999999999"></label>
    <label>Alerta de estoque baixo<input name="low_stock_limit" type="number" value="{{ settings.low_stock_limit or 2 }}"></label>
  </div>
  <button class="btn primary" type="submit">Salvar configurações</button>
</form>
{% endblock %}
