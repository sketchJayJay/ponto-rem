{% extends "admin/admin_base.html" %}
{% block admin_content %}
<header class="page-head"><div><p class="eyebrow">Venda</p><h1>Registrar nova venda</h1></div></header>
<form method="post" class="panel form-grid" data-sale-form>
  <div class="split">
    <label>Cliente<input name="customer_name" placeholder="Opcional"></label>
    <label>Telefone<input name="customer_phone" placeholder="Opcional"></label>
    <label>Pagamento<select name="payment_method"><option>Pix</option><option>Dinheiro</option><option>Cartão de débito</option><option>Cartão de crédito</option><option>Parcelado</option></select></label>
  </div>
  <div class="variant-head"><h2>Itens da venda</h2><button class="btn" type="button" data-add-sale-row>Adicionar item</button></div>
  <div data-sale-items>
    <div class="sale-row">
      <label>Produto
        <select name="variant_id[]" data-sale-select required>
          <option value="">Selecione</option>
          {% for v in variants %}<option value="{{ v.id }}" data-price="{{ v.price }}" data-stock="{{ v.quantity }}">{{ v.name }} • {{ v.color }} • Tam. {{ v.size }} • estoque {{ v.quantity }}</option>{% endfor %}
        </select>
      </label>
      <label>Qtd.<input name="quantity[]" type="number" min="1" value="1" data-sale-qty></label>
      <label>Valor unit.<input name="unit_price[]" type="number" step="0.01" value="0" data-sale-price></label>
      <button class="icon-btn" type="button" data-remove-row>×</button>
    </div>
  </div>
  <template id="sale-row-template">
    <div class="sale-row">
      <label>Produto
        <select name="variant_id[]" data-sale-select required>
          <option value="">Selecione</option>
          {% for v in variants %}<option value="{{ v.id }}" data-price="{{ v.price }}" data-stock="{{ v.quantity }}">{{ v.name }} • {{ v.color }} • Tam. {{ v.size }} • estoque {{ v.quantity }}</option>{% endfor %}
        </select>
      </label>
      <label>Qtd.<input name="quantity[]" type="number" min="1" value="1" data-sale-qty></label>
      <label>Valor unit.<input name="unit_price[]" type="number" step="0.01" value="0" data-sale-price></label>
      <button class="icon-btn" type="button" data-remove-row>×</button>
    </div>
  </template>
  <div class="split totals-line">
    <label>Desconto<input name="discount" type="number" step="0.01" value="0" data-sale-discount></label>
    <div class="sale-total">Total: <strong data-sale-total>R$ 0,00</strong></div>
  </div>
  <button class="btn primary" type="submit">Finalizar venda</button>
</form>
{% endblock %}
